<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <base href="%sveltekit.base%" />

    <title>Contact Nick Esselman</title>
    <meta
      name="description"
      content="Standalone contact page for Nick Esselman with source-aware links for other sites."
    />
    <meta name="author" content="Nick Esselman" />
    <meta name="robots" content="index,follow,max-snippet:-1,max-image-preview:large" />
    <link rel="canonical" href="https://contact.nickesselman.nl/" />

    <meta property="og:site_name" content="Contact Nick Esselman" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://contact.nickesselman.nl/" />
    <meta property="og:title" content="Contact Nick Esselman" />
    <meta
      property="og:description"
      content="Send a note, project idea, or report through the standalone Nick Esselman contact form."
    />

    <meta name="theme-color" content="#152312" />
    <meta name="color-scheme" content="light" />

    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
